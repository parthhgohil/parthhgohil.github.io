<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loading… — Parth Gohil</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cream: #faf6ef;
    --warm-white: #fff9f2;
    --navy: #0f1f3d;
    --rust: #c94f2a;
    --amber: #e8a030;
    --text: #2a2018;
    --muted: #7a6e60;
    --sand: #e8dcc8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 300;
    line-height: 1.8;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 48px;
    background: rgba(250,246,239,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(232,220,200,0.5);
  }

  .nav-back {
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.5px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--rust); }
  .nav-back::before { content: '←'; }

  .article-header {
    max-width: 740px;
    margin: 120px auto 60px;
    padding: 0 32px;
  }

  .article-date {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 16px;
  }

  .article-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 20px;
  }

  .article-subtitle {
    font-size: 18px;
    line-height: 1.6;
    color: var(--muted);
    font-weight: 300;
  }

  .article-body {
    max-width: 680px;
    margin: 0 auto 80px;
    padding: 0 32px;
  }

  .article-body p { margin-bottom: 24px; font-size: 17px; line-height: 1.8; }

  .article-body h2 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    margin-top: 48px;
    margin-bottom: 20px;
    line-height: 1.3;
  }

  .article-body h3 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-top: 36px;
    margin-bottom: 16px;
  }

  .article-body strong { font-weight: 500; color: var(--rust); }
  .article-body em { font-style: italic; color: var(--text); }

  .article-body a {
    color: var(--rust);
    text-decoration: underline;
    text-decoration-color: rgba(201,79,42,0.3);
    text-underline-offset: 3px;
    transition: text-decoration-color 0.2s;
  }
  .article-body a:hover { text-decoration-color: var(--rust); }

  .article-body blockquote {
    border-left: 3px solid var(--amber);
    padding-left: 24px;
    margin: 32px 0;
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-style: italic;
    color: var(--muted);
    line-height: 1.7;
  }

  .article-body ul,
  .article-body ol { margin-left: 24px; margin-bottom: 24px; }
  .article-body li { margin-bottom: 12px; font-size: 17px; }

  .article-body hr { border: none; border-top: 1px solid var(--sand); margin: 48px 0; }

  .callout {
    background: var(--warm-white);
    border-left: 4px solid var(--rust);
    padding: 24px 28px;
    margin: 32px 0;
    border-radius: 0 6px 6px 0;
  }
  .callout p { margin-bottom: 0; font-size: 16px; line-height: 1.7; }

  /* Error / loading states */
  .state-msg {
    text-align: center;
    padding: 120px 32px 80px;
    color: var(--muted);
    font-size: 16px;
  }
  .state-msg h2 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 12px;
  }

  footer {
    background: var(--navy);
    padding: 32px 48px;
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
  }
  footer strong { color: rgba(255,255,255,0.9); }

  @media (max-width: 768px) {
    nav { padding: 16px 24px; }
    .article-header { margin-top: 100px; padding: 0 24px; }
    .article-body { padding: 0 24px; }
    .article-body p, .article-body li { font-size: 16px; }
    .article-body h2 { font-size: 24px; margin-top: 36px; }
    .article-body h3 { font-size: 20px; margin-top: 28px; }
  }
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-back">Back to Home</a>
</nav>

<div id="post-root"></div>

<footer>
  <strong>Lt Cdr Parth Gohil (Retd.)</strong> · Founder, KWIK · Building things that move
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
  (async () => {
    const root = document.getElementById('post-root');

    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) {
      root.innerHTML = '<div class="state-msg"><h2>Post not found</h2><p>No post slug was provided.</p></div>';
      return;
    }

    let posts;
    try {
      const res = await fetch('/posts.json');
      if (!res.ok) throw new Error();
      posts = await res.json();
    } catch {
      root.innerHTML = '<div class="state-msg"><h2>Could not load posts</h2><p>Please try again later.</p></div>';
      return;
    }

    const post = posts.find(p => p.slug === slug);
    if (!post) {
      root.innerHTML = '<div class="state-msg"><h2>Post not found</h2><p>This article does not exist or may have been moved.</p></div>';
      return;
    }

    document.title = `${post.title} — Parth Gohil`;

    const bodyHtml = marked.parse(post.content, { breaks: false, gfm: true });

    root.innerHTML = `
      <header class="article-header">
        <div class="article-date">${escHtml(post.date)}</div>
        <h1 class="article-title">${escHtml(post.title)}</h1>
        <p class="article-subtitle">${escHtml(post.excerpt)}</p>
      </header>
      <article class="article-body">${bodyHtml}</article>
    `;
  })();

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
